<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AB-730 Study</title>
<style>
:root {
  --y:       #3b82f6;
  --y-light: #eff6ff;
  --y-text:  #1e40af;
  --text:    #111827;
  --muted:   #6b7280;
  --border:  #e5e7eb;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #dbeafe;
  color: var(--text);
  min-height: 100svh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 16px;
}

.card {
  background: #fff;
  border-radius: 20px;
  padding: 44px 48px;
  width: 100%;
  max-width: 720px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.08), 0 0 0 1px rgba(0,0,0,0.04);
  border-top: 4px solid var(--y);
}

/* ── Home ── */
.home-title { font-size: 1.7rem; font-weight: 800; margin-bottom: 6px; }
.home-sub   { font-size: 0.85rem; color: var(--muted); margin-bottom: 28px; }


.stats-hint { font-size: 0.8rem; color: #1d4ed8; margin-top: 4px; min-height: 18px; }
.reset-link { font-size: 0.75rem; color: var(--muted); cursor: pointer; text-decoration: underline; margin-top: 14px; display: inline-block; }

/* ── Progress ── */
.meta { display: flex; justify-content: space-between; align-items: center; font-size: 0.78rem; color: var(--muted); margin-bottom: 8px; }
.exit-link { background: none; border: none; color: var(--muted); font-size: 0.78rem; cursor: pointer; padding: 4px 0; font-family: inherit; }
.exit-link:hover { color: #dc2626; }
.progress-bar { height: 4px; background: var(--border); border-radius: 2px; margin-bottom: 24px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--y); border-radius: 2px; transition: width .4s ease; }

/* ── Question ── */
.q-img { display: block; max-width: 100%; height: auto; margin: 12px 0; border: 1px solid var(--border); border-radius: 8px; cursor: zoom-in; }
.q-meta-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.q-topic { font-size: 0.72rem; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); }
.q-source { display: flex; gap: 4px; flex-wrap: wrap; justify-content: flex-end; }
.src-pill {
  font-size: 0.68rem; font-weight: 600; padding: 2px 8px;
  border-radius: 99px; white-space: nowrap;
}
.src-primary { background: var(--y-light); color: var(--y-text); }
.src-also    { background: #f3f4f6; color: var(--muted); }
.q-text  { font-size: 1.1rem; font-weight: 600; line-height: 1.6; margin-bottom: 24px; }
.q-hint  { font-size: 0.78rem; color: var(--muted); margin-bottom: 12px; }

/* ── Options ── */
.opt {
  display: flex;
  gap: 12px;
  align-items: flex-start;
  width: 100%;
  padding: 13px 16px;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  background: #fff;
  font-size: 0.95rem;
  line-height: 1.5;
  cursor: pointer;
  margin-bottom: 10px;
  text-align: left;
  transition: border-color .12s, background .12s;
}
.opt:hover:not(:disabled)  { border-color: var(--y); background: var(--y-light); }
.opt:active:not(:disabled) { transform: scale(.98); }
.opt.selected { border-color: var(--y); background: var(--y-light); color: var(--y-text); }
.opt.correct  { border-color: #16a34a !important; background: #f0fdf4 !important; color: #166534 !important; }
.opt.wrong    { border-color: #dc2626 !important; background: #fef2f2 !important; color: #991b1b !important; }
.opt:disabled { cursor: default; }
.opt-key { font-weight: 700; min-width: 18px; flex-shrink: 0; opacity: .5; }
.opt.selected .opt-key, .opt.correct .opt-key, .opt.wrong .opt-key { opacity: 1; }

/* ── Fill-in ── */
.fill-input {
  width: 100%;
  background: #f9fafb;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 12px 14px;
  font-size: 1rem;
  outline: none;
  transition: border-color .15s, box-shadow .15s;
}
.fill-input:focus { border-color: var(--y); box-shadow: 0 0 0 3px var(--y-light); }
.fill-input.correct { border-color: #16a34a; background: #f0fdf4; box-shadow: none; }
.fill-input.wrong   { border-color: #dc2626; background: #fef2f2; box-shadow: none; }

/* ── Yes-No ── */
.yn-row { display: flex; align-items: center; gap: 10px; padding: 9px 0; border-bottom: 1px solid #f3f4f6; font-size: 0.875rem; }
.yn-row:last-child { border-bottom: none; }
.yn-stmt { flex: 1; line-height: 1.4; }
.yn-btns { display: flex; gap: 6px; flex-shrink: 0; }
.yn-btn {
  padding: 5px 13px;
  border: 1.5px solid var(--border);
  border-radius: 6px;
  background: #fff;
  font-size: 0.8rem;
  font-weight: 600;
  cursor: pointer;
  transition: all .12s;
}
.yn-btn:hover { border-color: var(--y); }
.yn-btn.selected { border-color: var(--y); background: var(--y); color: #fff; }
.yn-btn.correct  { border-color: #16a34a !important; background: #16a34a !important; color: #fff !important; }
.yn-btn.wrong    { border-color: #dc2626 !important; background: #dc2626 !important; color: #fff !important; }

/* ── Matching ── */
.match-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; font-size: 0.875rem; }
.match-stmt { flex: 1; }

/* ── HOTSPOT Complex ── */
.blank { display: inline-block; background: var(--y-light); color: var(--y-text); border: 1.5px dashed var(--y); border-radius: 4px; padding: 1px 8px; font-weight: 700; font-style: normal; margin: 0 3px; letter-spacing: 1px; }
.hc-stmt { padding: 8px 10px; margin-bottom: 4px; border-radius: 6px; font-size: 0.875rem; line-height: 1.5; background: #f9fafb; border: 1px solid #e5e7eb; }
.hc-stmt.correct { background: #dcfce7; border-color: #16a34a; color: #166534; font-weight: 600; }
.hc-match-row { padding: 10px; margin-bottom: 8px; border-radius: 8px; border: 1px solid #e5e7eb; background: #f9fafb; }
.hc-match-row.correct { border-color: #16a34a; background: #dcfce7; }
.hc-match-row.wrong   { border-color: #dc2626; background: #fef2f2; }
.hc-prompt { font-size: 0.85rem; line-height: 1.5; margin-bottom: 8px; color: #374151; }
.hc-opts { display: flex; flex-wrap: wrap; gap: 8px; }
.hc-opt { display: flex; align-items: center; gap: 5px; font-size: 0.82rem; cursor: pointer; padding: 4px 10px; border-radius: 99px; border: 1px solid #d1d5db; background: #fff; }
.hc-opt:hover { border-color: var(--y); }
.hc-opt.correct { border-color: #16a34a; background: #dcfce7; color: #166534; font-weight: 600; }
.match-sel {
  padding: 7px 10px; border: 1.5px solid var(--border);
  border-radius: 8px; font-size: 0.82rem; outline: none;
  transition: border-color .12s; min-width: 130px;
}
.match-sel:focus   { border-color: var(--y); }
.match-sel.correct { border-color: #16a34a; background: #f0fdf4; }
.match-sel.wrong   { border-color: #dc2626; background: #fef2f2; }

/* ── Feedback ── */
.fb { font-size: 0.82rem; margin-top: 14px; min-height: 0; line-height: 1.5; }
.fb.ok  { color: #16a34a; }
.fb.bad { color: #dc2626; }
.fb .note { color: #555; margin-top: 6px; padding-top: 6px; border-top: 1px solid #f3f4f6; font-size: 0.8rem; }

/* ── Actions ── */
.actions { display: flex; gap: 8px; margin-top: 22px; }
button.btn {
  flex: 1;
  padding: 13px;
  border: none;
  border-radius: 10px;
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
  transition: opacity .15s, transform .1s;
}
button.btn:active { transform: scale(.97); }
.btn-primary   { background: var(--y); color: #fff; }
.btn-secondary { background: #f3f4f6; color: var(--muted); flex: 0 0 auto; padding: 13px 16px; }

/* ── Quick buttons ── */
.section-label { font-size:.72rem; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); margin:20px 0 8px; }
.quick-btns { display:flex; gap:8px; }
.quick-btn { flex:1; padding:11px 6px 10px; border-radius:10px; border:1.5px solid #e5e7eb; background:#f9fafb; font-size:0.78rem; font-weight:600; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:3px; transition:all .15s; }
.quick-btn .qb-num { font-size:1.15rem; font-weight:800; color:var(--y); line-height:1; }
.quick-btn:hover:not(:disabled) { border-color:var(--y); background:var(--y-light); }
.quick-btn:disabled { opacity:.38; cursor:not-allowed; }
.quick-btn-warn .qb-num { color:#dc2626; }
.quick-btn-warn:hover:not(:disabled) { border-color:#dc2626; background:#fef2f2; }
.exam-btn { width:100%; margin-top:8px; padding:14px; border-radius:10px; border:none; background:var(--y); color:#fff; font-size:0.92rem; font-weight:700; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; transition:opacity .15s, transform .1s; }
.exam-btn:hover { opacity:.92; }
.exam-btn:active { transform:scale(.98); }
.exam-btn .ex-sub { font-weight:500; opacity:.85; font-size:0.78rem; }

/* ── Result domain breakdown ── */
.domain-breakdown { display:flex; flex-direction:column; gap:16px; margin-bottom:24px; text-align:left; }
.dom-head { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:7px; font-size:.84rem; gap:8px; }
.dom-head span { color:var(--text); }
.dom-head b { font-weight:700; white-space:nowrap; }
.dom-bar { height:6px; border-radius:3px; background:#f1f3f5; overflow:hidden; }
.dom-fill { height:100%; border-radius:3px; background:#16a34a; }
.dom-fill.fail { background:#dc2626; }
.dom-pass { color:#16a34a; }
.dom-fail { color:#dc2626; }

/* ── Topic chips ── */
.topic-chips { display:flex; flex-direction:column; gap:7px; }
.topic-chip { display:flex; align-items:center; justify-content:space-between; width:100%; padding:11px 14px; border-radius:10px; border:1.5px solid #e5e7eb; background:#f9fafb; font-size:0.85rem; font-weight:500; cursor:pointer; transition:all .15s; text-align:left; gap:8px; }
.topic-chip:hover { border-color:var(--y); background:var(--y-light); }
.chip-right { display:flex; align-items:center; gap:6px; flex-shrink:0; }
.chip-count { background:#e5e7eb; color:#374151; border-radius:99px; padding:2px 9px; font-size:0.72rem; font-weight:700; }
.chip-wrong { background:#fecaca; color:#dc2626; border-radius:99px; padding:2px 8px; font-size:0.72rem; font-weight:700; }

/* ── Result ── */
.res-top { text-align:center; margin-bottom:30px; }
.big-pct    { font-size: 3.4rem; font-weight: 800; line-height: 1; margin-bottom:10px; }
.res-badge { display:inline-block; font-size:.78rem; font-weight:700; padding:3px 12px; border-radius:99px; }
.res-badge.pass { background:#dcfce7; color:#15803d; }
.res-badge.fail { background:#fee2e2; color:#b91c1c; }
.result-sub { color: var(--muted); font-size: 0.82rem; margin-top:10px; }

/* ── Mobile ── */
@media (max-width: 540px) {
  body { padding: 0; justify-content: flex-start; background: #fff; }
  .card {
    border-radius: 0; box-shadow: none; max-width: 100%;
    min-height: 100svh; padding: 20px 20px 32px;
    display: flex; flex-direction: column;
  }
  .fb { flex: 1; }
  .actions { margin-top: auto; padding-top: 16px; }
}
</style>
</head>
<body>

<!-- Home -->
<div class="card" id="home">
  <div class="home-title">AB-730 Study</div>
  <div class="home-sub">Microsoft AI Business Professional · <span id="homeTotal">—</span> câu</div>
  <div class="stats-hint" id="statsHint"></div>

  <div class="section-label">Luyện tập</div>
  <div class="quick-btns">
    <button class="quick-btn" onclick="startAll()">
      <span class="qb-num" id="allCount">—</span>Tất cả
    </button>
    <button class="quick-btn" id="btnUnseen" onclick="startMode('unseen')">
      <span class="qb-num" id="unseenCount">—</span>Chưa làm
    </button>
    <button class="quick-btn quick-btn-warn" id="btnWrong" onclick="startMode('wrong')">
      <span class="qb-num" id="wrongCount">—</span>Câu sai
    </button>
  </div>
  <button class="exam-btn" onclick="startExam()">
    📝 Thi thử <span class="ex-sub">50 câu · random theo tỉ trọng</span>
  </button>

  <div class="section-label">Ôn theo topic</div>
  <div class="topic-chips" id="topicChips"></div>

  <a class="reset-link" onclick="resetProgress()">Xóa tiến trình</a>
</div>

<!-- Quiz -->
<div class="card" id="quiz" style="display:none">
  <div class="meta">
    <button class="exit-link" onclick="exitQuiz()">✕ Thoát</button>
    <span id="qNum">1 / 58</span>
    <span id="qScore">✓ 0</span>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progFill" style="width:0%"></div></div>

  <div class="q-meta-row">
    <div class="q-topic" id="qTopic"></div>
    <div class="q-source" id="qSource"></div>
  </div>
  <div class="q-text"  id="qText"></div>
  <div class="q-hint"  id="qHint"></div>
  <div id="qBody"></div>
  <div class="fb" id="fb"></div>

  <div class="actions">
    <button class="btn btn-secondary" id="btnPrev" onclick="prev()">←</button>
    <button class="btn btn-primary" id="btnCheck" onclick="check()">Kiểm tra</button>
    <button class="btn btn-primary" id="btnNext"  onclick="next()" style="display:none">Tiếp →</button>
  </div>
</div>

<!-- Result -->
<div class="card" id="results" style="display:none">
  <div class="res-top">
    <div class="big-pct" id="resPct"></div>
    <div class="res-badge" id="resBadge"></div>
    <div class="result-sub" id="resSub"></div>
  </div>
  <div class="section-label" id="domLabel">Theo domain · đạt khi ≥ 80%</div>
  <div class="domain-breakdown" id="resDomains"></div>
  <div class="actions" style="flex-direction:column;gap:8px">
    <button class="btn btn-primary" id="btnRetry" onclick="startMode('wrong')" style="display:none">Ôn câu sai →</button>
    <button class="btn btn-secondary" style="flex:none" onclick="startAll()">Làm lại →</button>
    <button class="btn btn-secondary" style="flex:none" onclick="goHome()">← Trang chủ</button>
  </div>
</div>

<script>
let Q=[], queue=[], cur=0, ok=0, bad=0, answered=false, sess=[];
const KEY='ab730v3';
const KEYS=['A','B','C','D','E','F'];

function load(){try{return JSON.parse(localStorage.getItem(KEY))||{seen:{},wrong:{},correct:{}};}catch{return{seen:{},wrong:{},correct:{}};}}
function save(p){localStorage.setItem(KEY,JSON.stringify(p));}

fetch('questions.json').then(r=>r.json()).then(d=>{Q=d.questions.filter(q=>q.type!=='fill-in');show('home');refresh();buildTopics();});

const TOPIC_GROUPS=[
  {label:'Understand generative AI fundamentals',     topics:['AI Fundamentals','Responsible AI','Data Privacy & Compliance','Data Security','M365 Copilot Versions','Agents & Licensing','Copilot Settings & Customization','AI Fundamentals & Security']},
  {label:'Manage prompts and conversations by using AI', topics:['Prompt Gallery & Management','Prompt Grounding','Prompt Errors & Troubleshooting','Conversation & Activity Management','Prompts & Conversations']},
  {label:'Draft and analyze business content by using AI', topics:['Copilot in M365 Apps','Notebook & Pages','Copilot Features & Tools','Agents — Creation & Configuration','Business Content & Collaboration']},
];

function refresh(){
  const p=load();
  const nW=Object.keys(p.wrong).length, nS=Object.keys(p.seen).length;
  const nUnseen=Math.max(Q.length-nS,0);
  const ht=document.getElementById('homeTotal'); if(ht) ht.textContent=Q.length;
  const ac=document.getElementById('allCount');  if(ac) ac.textContent=Q.length;
  document.getElementById('statsHint').textContent=`Đã làm: ${nS}/${Q.length} · Câu sai: ${nW}`;
  const wu=document.getElementById('unseenCount'); if(wu) wu.textContent=nUnseen;
  const ww=document.getElementById('wrongCount');  if(ww) ww.textContent=nW;
  const bw=document.getElementById('btnWrong');
  if(bw) bw.disabled=(nW===0);
  const bu=document.getElementById('btnUnseen');
  if(bu) bu.disabled=(nUnseen===0);
}

function startAll(){
  const p=load();
  const wrongIds=new Set(Object.keys(p.wrong).map(Number));
  const seenIds=new Set(Object.keys(p.seen).map(Number));
  const wrong=shuffle(Q.filter(q=>wrongIds.has(q.id)));
  const unseen=shuffle(Q.filter(q=>!seenIds.has(q.id)));
  const done=shuffle(Q.filter(q=>seenIds.has(q.id)&&!wrongIds.has(q.id)));
  queue=[...wrong,...unseen,...done];
  cur=0;ok=0;bad=0;sess=[];show('quiz');render();
}

function startExam(){
  // 50 câu random theo tỉ trọng: Fundamentals 30%, Prompts 40%, Business 30%
  const quota=[15,20,15];
  const pick=(g,n)=>shuffle(Q.filter(q=>TOPIC_GROUPS[g].topics.includes(q.topic))).slice(0,n);
  queue=shuffle([...pick(0,quota[0]),...pick(1,quota[1]),...pick(2,quota[2])]);
  cur=0;ok=0;bad=0;sess=[];show('quiz');render();
}

function startMode(mode){
  const p=load();
  const wrongIds=new Set(Object.keys(p.wrong).map(Number));
  const seenIds=new Set(Object.keys(p.seen).map(Number));
  if(mode==='wrong'){
    if(!wrongIds.size)return;
    queue=shuffle(Q.filter(q=>wrongIds.has(q.id)));
  }else{
    queue=shuffle(Q.filter(q=>!seenIds.has(q.id)));
    if(!queue.length)return;
  }
  cur=0;ok=0;bad=0;sess=[];show('quiz');render();
}

function render(){
  answered=false;
  window.scrollTo({top:0,behavior:'smooth'});
  const q=queue[cur];
  document.getElementById('progFill').style.width=(cur/queue.length*100)+'%';
  document.getElementById('qNum').textContent=`${cur+1} / ${queue.length}`;
  document.getElementById('qScore').textContent=`✓ ${ok}`;
  document.getElementById('qTopic').textContent=q.topic;
  const srcMap={examtopics:'ExamTopics',marks4sure:'Marks4Sure',pass4success:'Pass4Success',dumpsbase:'DumpsBase',edusum:'Edusum',microsoft:'Microsoft'};
  const srcEl=document.getElementById('qSource');
  let pills=`<span class="src-pill src-primary">${srcMap[q.source]||q.source}</span>`;
  if(q.also_in&&q.also_in.length) pills+=q.also_in.map(s=>`<span class="src-pill src-also">${srcMap[s]||s}</span>`).join('');
  srcEl.innerHTML=pills;
  let qHtml=q.question.replace(/\[BLANK\d?\]/g,'<span class="blank">[.....]</span>');
  qHtml=qHtml.includes('blank')?qHtml.replace(/<br\s*\/?>/gi,' '):qHtml;
  const imgTag=q.image?`<img class="q-img" src="${q.image}" alt="exhibit" onclick="window.open(this.src)">`:'';
  qHtml=qHtml.replace(/\/\/IMG\/\//g,imgTag);
  document.getElementById('qText').innerHTML=qHtml;
  const hintMap={'multiple-select':'Chọn nhiều đáp án','hotspot-yesno':'Chọn Yes / No cho từng câu','hotspot-complex':'Đọc và xem đáp án'};
  document.getElementById('qHint').textContent=hintMap[q.type]||'';
  document.getElementById('btnCheck').textContent=(q.type==='hotspot-complex'&&!q.subtype)?'Xem đáp án':'Kiểm tra';
  document.getElementById('fb').className='fb';
  document.getElementById('fb').innerHTML='';
  document.getElementById('btnCheck').style.display='';
  document.getElementById('btnNext').style.display='none';
  document.getElementById('btnNext').textContent=cur===queue.length-1?'Xem kết quả →':'Tiếp →';
  const bp=document.getElementById('btnPrev');bp.disabled=cur===0;bp.style.opacity=cur===0?'0.35':'';
  document.getElementById('quiz').dataset.qid=q.id;
  renderBody(q);
}

function renderBody(q){
  const body=document.getElementById('qBody');
  if(q.type==='single-select'||q.type==='multiple-select'){
    body.innerHTML=q.options.map((o,i)=>
      `<button class="opt" data-i="${i}" onclick="selOpt(this,'${q.type}')"><span class="opt-key">${KEYS[i]}</span>${o}</button>`
    ).join('');
  }else if(q.type==='fill-in'){
    body.innerHTML=`<input class="fill-input" id="fi" placeholder="Nhập đáp án..." autocomplete="off">`;
  }else if(q.type==='yes-no'){
    body.innerHTML=q.options.map((s,i)=>
      `<div class="yn-row"><div class="yn-stmt">${s}</div><div class="yn-btns">
        <button class="yn-btn" data-r="${i}" data-v="Yes" onclick="selYN(this)">Yes</button>
        <button class="yn-btn" data-r="${i}" data-v="No"  onclick="selYN(this)">No</button>
       </div></div>`
    ).join('');
  }else if(q.type==='matching'){
    body.innerHTML=q.options.map((s,i)=>
      `<div class="match-row"><div class="match-stmt">${s}</div>
       <select class="match-sel" data-i="${i}">
         <option value="">— chọn —</option>
         ${q.correct.map(a=>`<option value="${a}">${a}</option>`).join('')}
       </select></div>`
    ).join('');
  }else if(q.type==='hotspot-yesno'){
    body.innerHTML=q.statements.map((s,i)=>
      `<div class="yn-row"><div class="yn-stmt">${s}</div><div class="yn-btns">
        <button class="yn-btn" data-r="${i}" data-v="true"  onclick="selYN(this)">Yes</button>
        <button class="yn-btn" data-r="${i}" data-v="false" onclick="selYN(this)">No</button>
       </div></div>`
    ).join('');
  }else if(q.type==='hotspot-complex'){
    if(q.subtype==='match'){
      body.innerHTML=q.prompts.map((p,i)=>
        `<div class="hc-match-row" data-i="${i}">
           <div class="hc-prompt">${p}</div>
           <div class="hc-opts">${q.options.map((o,j)=>
             `<label class="hc-opt"><input type="radio" name="hcm${i}" data-r="${i}" data-v="${j}"> ${o}</label>`
           ).join('')}</div>
         </div>`
      ).join('');
    }else if(q.subtype==='select'){
      body.innerHTML=q.prompts.map((p,i)=>
        `<div class="hc-match-row" data-i="${i}">
           <div class="hc-prompt">${p}</div>
           <div class="hc-opts">${q.options_per_prompt[i].map((o,j)=>
             `<label class="hc-opt"><input type="radio" name="hcs${i}" data-r="${i}" data-v="${j}"> ${o}</label>`
           ).join('')}</div>
         </div>`
      ).join('');
    }else{
      body.innerHTML=q.statements.map((s,i)=>`<div class="hc-stmt" data-i="${i}">${s.replace(/\[BLANK\d?\]/g,'<span class="blank">[.....]</span>')}</div>`).join('');
    }
  }
}

function selOpt(el,type){
  if(answered)return;
  if(type==='single-select')document.querySelectorAll('.opt').forEach(o=>o.classList.remove('selected'));
  el.classList.toggle('selected');
}
function selYN(btn){
  if(answered)return;
  document.querySelectorAll(`.yn-btn[data-r="${btn.dataset.r}"]`).forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
}

function check(){
  const q=queue[cur];let isOk=false;
  if(q.type==='single-select'){
    const s=document.querySelector('.opt.selected');if(!s)return;
    const i=parseInt(s.dataset.i);isOk=q.correct.includes(i);
    document.querySelectorAll('.opt').forEach(o=>{
      const j=parseInt(o.dataset.i);o.classList.remove('selected');o.disabled=true;
      if(q.correct.includes(j))o.classList.add('correct');
      else if(j===i)o.classList.add('wrong');
    });
  }else if(q.type==='multiple-select'){
    const sels=[...document.querySelectorAll('.opt.selected')].map(o=>parseInt(o.dataset.i));
    if(!sels.length)return;
    isOk=sels.length===q.correct.length&&sels.every(i=>q.correct.includes(i));
    document.querySelectorAll('.opt').forEach(o=>{
      const j=parseInt(o.dataset.i);o.classList.remove('selected');o.disabled=true;
      if(q.correct.includes(j))o.classList.add('correct');
      else if(sels.includes(j))o.classList.add('wrong');
    });
  }else if(q.type==='fill-in'){
    const v=document.getElementById('fi').value.trim();if(!v)return;
    isOk=q.correct.some(c=>c.toLowerCase()===v.toLowerCase());
    document.getElementById('fi').classList.add(isOk?'correct':'wrong');
    document.getElementById('fi').disabled=true;
  }else if(q.type==='yes-no'){
    let all=true;
    for(let i=0;i<q.options.length;i++){
      const s=document.querySelector(`.yn-btn[data-r="${i}"].selected`);if(!s)return;
      const ok2=s.dataset.v===q.correct[i];
      s.classList.add(ok2?'correct':'wrong');
      if(!ok2){all=false;document.querySelectorAll(`.yn-btn[data-r="${i}"]`).forEach(b=>{if(b.dataset.v===q.correct[i])b.classList.add('correct');});}
    }
    isOk=all;
  }else if(q.type==='matching'){
    const sels=document.querySelectorAll('.match-sel');let fill=true,all=true;
    sels.forEach((s,i)=>{if(!s.value){fill=false;return;}const ok2=s.value===q.correct[i];s.classList.add(ok2?'correct':'wrong');s.disabled=true;if(!ok2)all=false;});
    if(!fill)return;isOk=all;
  }else if(q.type==='hotspot-yesno'){
    let all=true;
    for(let i=0;i<q.statements.length;i++){
      const s=document.querySelector(`.yn-btn[data-r="${i}"].selected`);if(!s)return;
      const userBool=(s.dataset.v==='true');
      const ok2=(userBool===q.correct[i]);
      s.classList.add(ok2?'correct':'wrong');
      if(!ok2){all=false;document.querySelectorAll(`.yn-btn[data-r="${i}"]`).forEach(b=>{if((b.dataset.v==='true')===q.correct[i])b.classList.add('correct');});}
    }
    isOk=all;
  }else if(q.type==='hotspot-complex'){
    if(q.subtype==='match'||q.subtype==='select'){
      const prefix=q.subtype==='match'?'hcm':'hcs';
      let all=true;
      for(let i=0;i<q.prompts.length;i++){
        const sel=document.querySelector(`input[name="${prefix}${i}"]:checked`);if(!sel)return;
        const ok2=parseInt(sel.dataset.v)===q.correct[i];
        const row=document.querySelector(`.hc-match-row[data-i="${i}"]`);
        row.classList.add(ok2?'correct':'wrong');
        if(!ok2){all=false;row.querySelector(`input[data-v="${q.correct[i]}"]`).closest('label').classList.add('correct');}
        row.querySelectorAll('input').forEach(r=>r.disabled=true);
      }
      isOk=all;
    }else{
      q.correct.forEach(ci=>document.querySelector(`.hc-stmt[data-i="${ci}"]`)?.classList.add('correct'));
      isOk=true;
    }
  }
  answered=true;
  showFb(q,isOk);
  record(q,isOk);
  document.getElementById('btnCheck').style.display='none';
  document.getElementById('btnNext').style.display='';
}

function showFb(q,isOk){
  const fb=document.getElementById('fb');
  if(q.type==='hotspot-complex'&&!q.subtype){
    fb.className='fb ok';fb.innerHTML='📋 Đáp án đã hiển thị (các mục được tô xanh)';
    if(q.note)fb.innerHTML+=`<div class="note">${q.note}</div>`;
    return;
  }
  if(isOk){
    fb.className='fb ok';fb.innerHTML='✅ Chính xác!';
  }else{
    let ans='';
    if(q.type==='single-select'||q.type==='multiple-select')ans=q.correct.map(i=>`<b>${KEYS[i]}. ${q.options[i]}</b>`).join(', ');
    else if(q.type==='fill-in')ans=q.correct.join(' / ');
    else if(q.type==='yes-no')ans=q.options.map((s,i)=>`${s}: <b>${q.correct[i]}</b>`).join(' · ');
    else if(q.type==='matching')ans=q.options.map((s,i)=>`${s} → <b>${q.correct[i]}</b>`).join(' · ');
    else if(q.type==='hotspot-yesno')ans=q.statements.map((s,i)=>`${s.length>60?s.slice(0,60)+'…':s}: <b>${q.correct[i]?'Yes':'No'}</b>`).join('<br>');
    else if(q.type==='hotspot-complex'&&q.subtype==='select')ans=q.prompts.map((p,i)=>`${p} <b>${q.options_per_prompt[i][q.correct[i]]}</b>`).join('<br>');
    fb.className='fb bad';fb.innerHTML=`❌ Sai. Đáp án: ${ans}`;
  }
  if(q.note)fb.innerHTML+=`<div class="note">${q.note}</div>`;
}

function record(q,isOk){
  const p=load();p.seen[q.id]=true;
  if(isOk){p.correct[q.id]=true;delete p.wrong[q.id];ok++;}
  else{p.wrong[q.id]=true;delete p.correct[q.id];bad++;}
  sess.push({topic:q.topic,ok:isOk});
  save(p);document.getElementById('qScore').textContent=`✓ ${ok}`;
}

function next(){cur++;if(cur>=queue.length)showResults();else render();}
function prev(){if(cur>0){cur--;render();}}
function exitQuiz(){if(confirm('Thoát về trang chủ? Câu đã làm vẫn được lưu, chỉ dừng phiên hiện tại.'))goHome();}

function showResults(){
  show('results');
  const total=ok+bad,pct=Math.round(ok/total*100);
  const PASS=80, passed=pct>=PASS;
  const pctEl=document.getElementById('resPct');
  pctEl.textContent=pct+'%';
  pctEl.style.color=passed?'#16a34a':'#dc2626';
  const badge=document.getElementById('resBadge');
  badge.className='res-badge '+(passed?'pass':'fail');
  badge.textContent=passed?'Đạt':'Chưa đạt';
  document.getElementById('resSub').textContent=`${ok}/${total} câu đúng · mức đạt ${PASS}%`;
  const labels=['Generative AI fundamentals','Prompts & conversations','Business content'];
  const dom=[[0,0],[0,0],[0,0]];
  sess.forEach(r=>{const gi=TOPIC_GROUPS.findIndex(g=>g.topics.includes(r.topic));if(gi<0)return;dom[gi][1]++;if(r.ok)dom[gi][0]++;});
  document.getElementById('domLabel').style.display=dom.some(s=>s[1])?'':'none';
  document.getElementById('resDomains').innerHTML=dom.map((s,i)=>{
    if(!s[1])return '';
    const dp=Math.round(s[0]/s[1]*100), dpass=dp>=PASS;
    return `<div class="dom-row"><div class="dom-head"><span>${labels[i]}</span><b class="${dpass?'dom-pass':'dom-fail'}">${s[0]}/${s[1]} · ${dp}%</b></div><div class="dom-bar"><div class="dom-fill${dpass?'':' fail'}" style="width:${dp}%"></div></div></div>`;
  }).join('');
  const nW=Object.keys(load().wrong).length;
  const btn=document.getElementById('btnRetry');
  btn.style.display=nW?'':'none';btn.textContent=`Ôn ${nW} câu sai`;
}

function buildTopics(){
  const p=load();
  const wrongIds=new Set(Object.keys(p.wrong).map(Number));
  document.getElementById('topicChips').innerHTML=TOPIC_GROUPS.map(g=>{
    const n=Q.filter(q=>g.topics.includes(q.topic)).length;
    const w=Q.filter(q=>g.topics.includes(q.topic)&&wrongIds.has(q.id)).length;
    const wTag=w?`<span class="chip-wrong">${w} sai</span>`:'';
    const key=JSON.stringify(g.topics).replace(/"/g,'&quot;');
    return `<button class="topic-chip" onclick="startTopic(this)" data-topics="${key}">
      <span>${g.label}</span>
      <span class="chip-right"><span class="chip-count">${n} câu</span>${wTag}</span>
    </button>`;
  }).join('');
}
function startTopic(btn){
  const topics=JSON.parse(btn.dataset.topics);
  queue=shuffle(Q.filter(q=>topics.includes(q.topic)));
  cur=0;ok=0;bad=0;sess=[];show('quiz');render();
}
function goHome(){ show('home'); refresh(); buildTopics(); }
function show(s){ ['home','quiz','results'].forEach(id=>document.getElementById(id).style.display=id===s?'block':'none'); }
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function resetProgress(){if(confirm('Xóa tiến trình?')){localStorage.removeItem(KEY);refresh();buildTopics();}}
</script>
